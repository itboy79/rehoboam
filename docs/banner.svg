<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" role="img" aria-label="BRIGADE — the kitchen pass">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#231a12"/>
      <stop offset="100%" stop-color="#0f0a06"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7d2c9"/>
      <stop offset="100%" stop-color="#8d867b"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd98a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="880" height="380" fill="url(#bg)"/>

  <!-- heat lamps over the pass -->
  <g>
    <circle cx="290" cy="52" r="60" fill="url(#lamp)">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="52" r="60" fill="url(#lamp)">
      <animate attributeName="opacity" values="1;0.6;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="52" r="9" fill="#e8b45a"/>
    <circle cx="590" cy="52" r="9" fill="#e8b45a"/>
    <line x1="290" y1="0" x2="290" y2="45" stroke="#4a3f30" stroke-width="3"/>
    <line x1="590" y1="0" x2="590" y2="45" stroke="#4a3f30" stroke-width="3"/>
  </g>

  <!-- steam over the toque -->
  <g fill="none" stroke="#9b948a" stroke-width="2.6" stroke-linecap="round" opacity="0.55">
    <path d="M 410 96 q -8 -14 0 -26 q 8 -12 0 -24">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.15;0.55" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 440 92 q 9 -16 0 -30 q -9 -13 0 -26">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 470 96 q -8 -14 0 -26 q 8 -12 0 -24">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -9; 0 0" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.12;0.45" dur="2.7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- the toque -->
  <g>
    <path d="M 392 150
             q -26 0 -26 -22 q 0 -18 17 -20
             q 2 -16 20 -16 q 8 -12 22 -12 q 10 -8 20 0
             q 14 -2 20 12 q 18 0 20 16 q 17 2 17 20 q 0 22 -26 22 z"
          fill="#f3efe7" stroke="#c9c2b4" stroke-width="2"/>
    <rect x="392" y="150" width="96" height="18" rx="3" fill="url(#steel)"/>
    <line x1="416" y1="150" x2="416" y2="168" stroke="#7a7368" stroke-width="1.5"/>
    <line x1="440" y1="150" x2="440" y2="168" stroke="#7a7368" stroke-width="1.5"/>
    <line x1="464" y1="150" x2="464" y2="168" stroke="#7a7368" stroke-width="1.5"/>
  </g>

  <!-- ticket rail -->
  <line x1="180" y1="205" x2="700" y2="205" stroke="#6b6154" stroke-width="4"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" text-anchor="middle">
    <g>
      <rect x="228" y="205" width="92" height="42" rx="2" fill="#efe9dc" transform="rotate(-1.6 274 205)"/>
      <text x="274" y="230" fill="#3d3529" transform="rotate(-1.6 274 205)">TICKET #1</text>
      <animateTransform attributeName="transform" type="rotate" values="-1.2 274 205; 1.2 274 205; -1.2 274 205" dur="4s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="394" y="205" width="92" height="42" rx="2" fill="#efe9dc" transform="rotate(1.4 440 205)"/>
      <text x="440" y="230" fill="#3d3529" transform="rotate(1.4 440 205)">TICKET #2</text>
      <animateTransform attributeName="transform" type="rotate" values="1.2 440 205; -1.2 440 205; 1.2 440 205" dur="4.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="560" y="205" width="92" height="42" rx="2" fill="#efe9dc" transform="rotate(-1 606 205)"/>
      <text x="606" y="230" fill="#3d3529" transform="rotate(-1 606 205)">TICKET #3</text>
      <animateTransform attributeName="transform" type="rotate" values="-1 606 205; 1.4 606 205; -1 606 205" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- the pass counter -->
  <rect x="150" y="268" width="580" height="8" rx="2" fill="url(#steel)"/>
  <text x="440" y="262" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="6" fill="#e8b45a">THE PASS</text>

  <!-- title -->
  <text x="440" y="322" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="36" letter-spacing="16" fill="#f3efe7">BRIGADE</text>
  <text x="440" y="346" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#a89a83">one chef writes the menu · a brigade cooks it · nothing leaves the pass untasted</text>
  <text x="440" y="366" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="1" fill="#6b6154">formerly known as Rehoboam — the machine learned to cook</text>
</svg>
