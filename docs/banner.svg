<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" role="img" aria-label="REHOBOAM — divergence sphere">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0c2430"/>
      <stop offset="100%" stop-color="#04141c"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0e7490"/>
      <stop offset="45%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#e8b45a"/>
      <stop offset="65%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <clipPath id="ringClip"><rect x="256" y="100" width="368" height="120"/></clipPath>
  </defs>

  <rect width="880" height="360" fill="url(#bg)"/>

  <!-- dotted sphere latitudes -->
  <g fill="none" stroke="#1d5b70" stroke-width="1.6" stroke-dasharray="1 7" stroke-linecap="round" opacity="0.9">
    <ellipse cx="440" cy="160" rx="150" ry="150">
      <animateTransform attributeName="transform" type="rotate" from="0 440 160" to="360 440 160" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="440" cy="160" rx="150" ry="52"/>
    <ellipse cx="440" cy="115" rx="122" ry="38"/>
    <ellipse cx="440" cy="205" rx="122" ry="38"/>
    <ellipse cx="440" cy="78"  rx="72"  ry="22"/>
    <ellipse cx="440" cy="242" rx="72"  ry="22"/>
  </g>

  <!-- equatorial divergence waveform: two copies sliding for a seamless loop -->
  <g clip-path="url(#ringClip)">
    <g>
      <path fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" d="
        M 256 160
        q 10 -10 20 0 t 20 0 t 20 0 t 20 0
        q 8 -22 16 0 q 8 26 16 0 q 6 -44 12 0 q 8 30 16 0
        t 20 0 t 20 0 t 20 0 t 20 0
        q 8 -18 16 0 q 8 20 16 0
        t 20 0 t 20 0 t 20 0 t 20 0
        q 8 -22 16 0 q 8 26 16 0 q 6 -44 12 0 q 8 30 16 0
        t 20 0 t 20 0 t 20 0 t 20 0
        q 8 -18 16 0 q 8 20 16 0
        t 20 0 t 20 0"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-368 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  <!-- ring glow line -->
  <line x1="262" y1="160" x2="618" y2="160" stroke="#155e75" stroke-width="1" opacity="0.5"/>

  <!-- core -->
  <circle cx="440" cy="160" r="5" fill="#f8fafc">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="160" r="11" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="9;16;9" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- title -->
  <text x="440" y="316" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" letter-spacing="14" fill="#e2e8f0">REHOBOAM</text>
  <text x="440" y="342" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#67a3b8">one head predicts · many arms act · nothing diverges unreviewed</text>
</svg>
